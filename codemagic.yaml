workflows:
  ios-release:
    name: NoMoreBets iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      groups:
        # Codemagic encrypted group for any EXPO_PUBLIC_* secrets that must reach the build without
        # living in git. (Admin auth no longer needs a client secret — it uses the admin's login JWT.)
        - nomorebets_secrets
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        EXPO_NO_TELEMETRY: "1"
        APP_IDENTIFIER: "com.nomorebets.app"
        APPLE_TEAM_ID: "SK2FKVF4KW"
        SENTRY_ORG: "nezha2-capital-inc"
        SENTRY_PROJECT: "nomorebets"
      ios_signing:
        provisioning_profiles:
          - "NoMoreBets_AppStore_AppleSignIn"
        certificates:
          - "Nassau Connect"

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Load EXPO_PUBLIC env vars
        script: |
          # Force EXPO_PUBLIC_* from .env into the build environment so Metro inlines them.
          # The iOS bundle phase does not reliably pick up the .env file on its own, which
          # left SUPABASE_URL/ANON_KEY empty in the app ("Supabase not configured").
          grep -E '^EXPO_PUBLIC_' .env >> "$CM_ENV"
          echo "Loaded EXPO_PUBLIC vars into build env:"
          grep -E '^EXPO_PUBLIC_' .env | cut -d= -f1 | sed 's/^/  - /'

      # Source-map upload needs SENTRY_AUTH_TOKEN. Without one sentry-cli fails, and
      # node_modules/@sentry/react-native/scripts/sentry-xcode.sh sets exitCode=1 — which fails the
      # entire build. (SENTRY_ALLOW_FAILURE is named in that script's error text but never actually
      # implemented, so it is not an escape hatch.) So decide from the token itself: add
      # SENTRY_AUTH_TOKEN to the nomorebets_secrets group and uploads start working with no further
      # code change; leave it unset and the build simply ships minified stack traces. Crash
      # reporting itself is unaffected either way.
      - name: Enable Sentry source maps only when a token is present
        script: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN found — source map upload ENABLED"
            echo "SENTRY_DISABLE_AUTO_UPLOAD=false" >> "$CM_ENV"
          else
            echo "No SENTRY_AUTH_TOKEN — source map upload DISABLED (stack traces stay minified)"
            echo "SENTRY_DISABLE_AUTO_UPLOAD=true" >> "$CM_ENV"
          fi

      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --clean

      # The OTA channel lives in app.json (updates.requestHeaders) and is only written into
      # Expo.plist by prebuild, which cannot run on Windows — so this is the first point where it
      # can be checked at all. Without the header the build silently ships unable to ever receive
      # an EAS Update, which is exactly how 1.1.0 (build 30) went out. Fail loudly instead.
      - name: Assert OTA channel baked into Expo.plist
        script: |
          set -e
          PLIST=$(find ios -name Expo.plist | head -1)
          if [ -z "$PLIST" ]; then echo "FAIL: Expo.plist not found after prebuild"; exit 1; fi
          echo "Expo.plist -> $PLIST"
          plutil -convert json -o - "$PLIST" | node -e '
            let s = "";
            process.stdin.on("data", (d) => (s += d)).on("end", () => {
              const channel = (JSON.parse(s).EXUpdatesRequestHeaders || {})["expo-channel-name"];
              console.log("expo-channel-name =", JSON.stringify(channel));
              if (channel !== "production") {
                console.error("FAIL: OTA channel missing/wrong — this build could never receive an EAS Update.");
                process.exit(1);
              }
              console.log("OK: OTA channel baked in.");
            });
          '

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Set iOS version and build number
        script: |
          # Read the marketing version from app.json instead of hardcoding it. app.json's version
          # also drives runtimeVersion (policy: appVersion), so a hardcoded copy here can silently
          # disagree with it. Build 44 died on exactly this class of problem: App Store Connect
          # rejects a build whose version train is already released ("Invalid Pre-Release Train",
          # error 90186), which means every release from now on must bump app.json — and this line
          # must follow it automatically rather than be remembered.
          set -euo pipefail
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          echo "marketing version from app.json: $APP_VERSION"
          # Fail here rather than 40 minutes later at upload: an empty version silently produces a
          # binary App Store Connect will reject.
          [ -n "$APP_VERSION" ] || { echo "FAIL: could not read version from app.json"; exit 1; }
          cd ios
          agvtool new-marketing-version "$APP_VERSION"
          # Auto-increment from Codemagic's per-project build counter ($BUILD_NUMBER == the build
          # "Index") so the uploaded build is always higher than the last App Store build. Was
          # hardcoded to 29, which kept colliding (App Store Connect 409 ATTRIBUTE.INVALID.DUPLICATE).
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Create export options plist from installed profile
        script: |
          python3 - <<'PY'
          import os
          import glob
          import plistlib
          import subprocess
          import sys
          from datetime import datetime

          bundle_id = os.environ.get("APP_IDENTIFIER", "com.nomorebets.app")
          team_id = os.environ.get("APPLE_TEAM_ID", "SK2FKVF4KW")
          profile_dir = os.path.expanduser("~/Library/MobileDevice/Provisioning Profiles")
          profile_paths = glob.glob(os.path.join(profile_dir, "*.mobileprovision"))

          print(f"Looking for installed App Store profile:")
          print(f"Bundle ID: {bundle_id}")
          print(f"Team ID: {team_id}")
          print(f"Profile dir: {profile_dir}")
          print(f"Installed profiles found: {len(profile_paths)}")

          matches = []

          for path in profile_paths:
              try:
                  raw = subprocess.check_output(["security", "cms", "-D", "-i", path], stderr=subprocess.STDOUT)
                  profile = plistlib.loads(raw)
              except Exception as exc:
                  print(f"Could not read profile {path}: {exc}")
                  continue

              name = profile.get("Name", "")
              uuid = profile.get("UUID", "")
              team_ids = profile.get("TeamIdentifier", [])
              expiration = profile.get("ExpirationDate")
              entitlements = profile.get("Entitlements", {})
              app_identifier = entitlements.get("application-identifier", "")
              provisioned_devices = profile.get("ProvisionedDevices")
              provisions_all_devices = profile.get("ProvisionsAllDevices", False)

              print("----")
              print(f"Name: {name}")
              print(f"UUID: {uuid}")
              print(f"App Identifier: {app_identifier}")
              print(f"Team IDs: {team_ids}")
              print(f"Expiration: {expiration}")
              print(f"ProvisionedDevices: {'yes' if provisioned_devices else 'no'}")
              print(f"ProvisionsAllDevices: {provisions_all_devices}")

              is_bundle_match = app_identifier.endswith("." + bundle_id)
              is_team_match = team_id in team_ids
              is_distribution_profile = not provisioned_devices and not provisions_all_devices

              if is_bundle_match and is_team_match and is_distribution_profile:
                  matches.append((expiration or datetime.min, path, profile))

          if not matches:
              print("ERROR: No matching installed App Store provisioning profile found.")
              print("Expected bundle:", bundle_id)
              print("Expected team:", team_id)
              sys.exit(1)

          matches.sort(key=lambda item: item[0], reverse=True)
          selected_expiration, selected_path, selected_profile = matches[0]

          profile_name = selected_profile.get("Name")
          profile_uuid = selected_profile.get("UUID")

          print("Selected provisioning profile:")
          print(f"Name: {profile_name}")
          print(f"UUID: {profile_uuid}")
          print(f"Path: {selected_path}")
          print(f"Expiration: {selected_expiration}")

          export_options = {
              "method": "app-store-connect",
              "destination": "export",
              "signingStyle": "manual",
              "teamID": team_id,
              "provisioningProfiles": {
                  bundle_id: profile_uuid
              },
              "uploadSymbols": True,
              "compileBitcode": False,
              "manageAppVersionAndBuildNumber": False
          }

          export_path = "/tmp/exportOptions.plist"
          with open(export_path, "wb") as f:
              plistlib.dump(export_options, f)

          print(f"Created export options at {export_path}")
          print(export_options)
          PY

          plutil -lint /tmp/exportOptions.plist
          plutil -p /tmp/exportOptions.plist

      - name: Build IPA
        script: |
          IOS_WORKSPACE="ios/NOMOREBETS.xcworkspace"
          IOS_SCHEME="NOMOREBETS"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/archive/NOMOREBETS.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa"

          echo "Workspace: $IOS_WORKSPACE"
          echo "Scheme: $IOS_SCHEME"
          echo "Archive path: $ARCHIVE_PATH"
          echo "Export path: $EXPORT_PATH"

          mkdir -p "$CM_BUILD_DIR/build/ios/archive"
          mkdir -p "$EXPORT_PATH"

          xcodebuild archive -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -configuration Release -destination "generic/platform=iOS" -archivePath "$ARCHIVE_PATH" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportPath "$EXPORT_PATH" -exportOptionsPlist /tmp/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: NoMoreBets Android Release
    max_build_duration: 90
    instance_type: linux_x2

    environment:
      groups:
        # Same encrypted group as iOS: EXPO_PUBLIC_* (loaded from .env below), SENTRY_AUTH_TOKEN, and —
        # once you add it — GCLOUD_SERVICE_ACCOUNT_CREDENTIALS for automated Play uploads.
        - nomorebets_secrets
      node: 22
      java: 17
      # Upload the UPLOAD keystore in Codemagic → Code signing identities → Android keystores, using the
      # reference name below. Codemagic then exposes CM_KEYSTORE_PATH / CM_KEYSTORE_PASSWORD /
      # CM_KEY_ALIAS / CM_KEY_PASSWORD, which the "Configure release signing" step wires into Gradle.
      android_signing:
        - nomorebets_upload
      vars:
        EXPO_NO_TELEMETRY: "1"
        PACKAGE_NAME: "com.nomorebets.app"
        SENTRY_ORG: "nezha2-capital-inc"
        SENTRY_PROJECT: "nomorebets"

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Load EXPO_PUBLIC env vars
        script: |
          # Same as iOS: force EXPO_PUBLIC_* from .env into the build env so Metro inlines them
          # (Supabase URL/anon key). Without this the Android bundle ships "Supabase not configured".
          grep -E '^EXPO_PUBLIC_' .env >> "$CM_ENV"
          echo "Loaded EXPO_PUBLIC vars into build env:"
          grep -E '^EXPO_PUBLIC_' .env | cut -d= -f1 | sed 's/^/  - /'

      # Identical gate to iOS: add SENTRY_AUTH_TOKEN to nomorebets_secrets and Android source-map upload
      # turns on; leave it unset and the build ships minified traces (crash reporting still works).
      - name: Enable Sentry source maps only when a token is present
        script: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            echo "SENTRY_AUTH_TOKEN found — source map upload ENABLED"
            echo "SENTRY_DISABLE_AUTO_UPLOAD=false" >> "$CM_ENV"
          else
            echo "No SENTRY_AUTH_TOKEN — source map upload DISABLED (stack traces stay minified)"
            echo "SENTRY_DISABLE_AUTO_UPLOAD=true" >> "$CM_ENV"
          fi

      - name: Prebuild Android project
        script: |
          npx expo prebuild --platform android --clean

      # Android analog of the iOS Expo.plist check. prebuild writes the update channel (expo-channel-name)
      # into AndroidManifest.xml / res/values/strings.xml. Warn-only for now: the exact storage key varies
      # by Expo version so we don't hard-fail a correct build — but a present-yet-WRONG channel is a hard
      # fail (that is the 1.1.0-class OTA bug). Harden to a hard-fail once the key is confirmed on CI.
      - name: Assert OTA channel baked into Android config
        script: |
          set +e
          MANIFEST=android/app/src/main/AndroidManifest.xml
          STRINGS=android/app/src/main/res/values/strings.xml
          if grep -rhoE 'expo-channel-name[^}]*production' "$MANIFEST" "$STRINGS" 2>/dev/null | grep -q production; then
            echo "OK: OTA channel 'production' present in Android config."
          elif grep -rq 'expo-channel-name' "$MANIFEST" "$STRINGS" 2>/dev/null; then
            echo "FAIL: expo-channel-name present but not 'production' — this build could never receive the right EAS Update."
            exit 1
          else
            echo "WARN: expo-channel-name not located (Expo-version specific). Verify Android OTA on first successful build before relying on it."
          fi

      - name: Set Android versionCode from build number
        script: |
          set -euo pipefail
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          echo "versionName (from app.json): $APP_VERSION"
          [ -n "$BUILD_NUMBER" ] || { echo "FAIL: BUILD_NUMBER not set"; exit 1; }
          node -e '
            const fs = require("fs");
            const p = "android/app/build.gradle";
            let g = fs.readFileSync(p, "utf8");
            const bn = process.env.BUILD_NUMBER;
            const before = g;
            g = g.replace(/versionCode\s+\d+/, "versionCode " + bn);
            if (g === before) { console.error("FAIL: could not set versionCode in build.gradle"); process.exit(1); }
            fs.writeFileSync(p, g);
            console.log("Set versionCode = " + bn);
          '

      # Expo prebuild regenerates android/app/build.gradle each run with a debug-signed release buildType.
      # Inject a real release signingConfig backed by the Codemagic keystore env vars.
      - name: Configure release signing
        script: |
          set -euo pipefail
          node -e '
            const fs = require("fs");
            const p = "android/app/build.gradle";
            let g = fs.readFileSync(p, "utf8");
            if (g.includes("signingConfigs.release")) { console.log("release signingConfig already present"); process.exit(0); }
            const releaseBlock = [
              "        release {",
              "            storeFile file(System.getenv(\"CM_KEYSTORE_PATH\"))",
              "            storePassword System.getenv(\"CM_KEYSTORE_PASSWORD\")",
              "            keyAlias System.getenv(\"CM_KEY_ALIAS\")",
              "            keyPassword System.getenv(\"CM_KEY_PASSWORD\")",
              "        }"
            ].join("\n");
            let before = g;
            g = g.replace(/signingConfigs\s*\{/, function (m) { return m + "\n" + releaseBlock; });
            if (g === before) { console.error("FAIL: signingConfigs block not found for injection"); process.exit(1); }
            before = g;
            g = g.replace(/(buildTypes\s*\{[\s\S]*?release\s*\{[\s\S]*?signingConfig\s+signingConfigs\.)debug/, "$1release");
            if (g === before) { console.error("FAIL: could not repoint release buildType to signingConfigs.release"); process.exit(1); }
            fs.writeFileSync(p, g);
            console.log("Injected release signingConfig and repointed release buildType.");
          '

      - name: Build Android App Bundle (.aab)
        script: |
          set -euo pipefail
          cd android
          ./gradlew bundleRelease --no-daemon

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    # FIRST upload only: Google Play's Developer API cannot create an app's very first release. Download
    # the .aab artifact above and upload it manually to the Internal testing track once. After that first
    # manual release exists, add GCLOUD_SERVICE_ACCOUNT_CREDENTIALS to nomorebets_secrets and UNCOMMENT
    # the block below to auto-publish subsequent builds.
    # publishing:
    #   google_play:
    #     credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
    #     track: internal
    #     submit_as_draft: false
