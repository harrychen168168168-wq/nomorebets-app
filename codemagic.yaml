workflows:
  ios-release:
    name: NoMoreBets iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic

    environment:
      node: 22
      xcode: latest
      cocoapods: default
      vars:
        EXPO_NO_TELEMETRY: "1"
        APP_IDENTIFIER: "com.nomorebets.app"
        APPLE_TEAM_ID: "SK2FKVF4KW"
      ios_signing:
        provisioning_profiles:
          - "NoMoreBets_AppStore_Valid"
        certificates:
          - "Nassau Connect"

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles

      - name: Set iOS version and build number
        script: |
          cd ios
          agvtool new-marketing-version 1.1.0
          agvtool new-version -all 3

      - name: Create export options plist
        script: |
          python3 - <<'PY'
          import plistlib

          export_options = {
              "method": "app-store-connect",
              "destination": "export",
              "signingStyle": "manual",
              "teamID": "SK2FKVF4KW",
              "provisioningProfiles": {
                  "com.nomorebets.app": "NoMoreBets_AppStore_Valid"
              },
              "uploadSymbols": True,
              "compileBitcode": False
          }

          with open("/tmp/exportOptions.plist", "wb") as f:
              plistlib.dump(export_options, f)
          PY

          plutil -lint /tmp/exportOptions.plist
          plutil -p /tmp/exportOptions.plist

      - name: Build IPA
        script: |
          IOS_WORKSPACE="ios/NOMOREBETS.xcworkspace"
          IOS_SCHEME="NOMOREBETS"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/archive/NOMOREBETS.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa"

          echo "Workspace: $IOS_WORKSPACE"
          echo "Scheme: $IOS_SCHEME"
          echo "Archive path: $ARCHIVE_PATH"
          echo "Export path: $EXPORT_PATH"

          mkdir -p "$CM_BUILD_DIR/build/ios/archive"
          mkdir -p "$EXPORT_PATH"

          xcodebuild archive \
            -workspace "$IOS_WORKSPACE" \
            -scheme "$IOS_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist /tmp/exportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
