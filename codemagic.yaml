workflows:
  ios-release:
    name: iOS Release to App Store Connect
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      vars:
        APP_STORE_APP_ID: "6775357184"
        XCODE_WORKSPACE: "ios/NOMOREBETS.xcworkspace"
        XCODE_SCHEME: "NOMOREBETS"
        BUNDLE_ID: "com.nomorebets.app"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies
        script: |
          npm install
      - name: Prebuild iOS project
        script: |
          npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set up iOS code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Set iOS version and build number
        script: |
          cd ios
          agvtool new-marketing-version 1.1.0
          agvtool new-version -all 6
      - name: Create export options plist from installed profile
        script: |
          PROFILE_NAME=$(security cms -D -i "$CM_PROVISIONING_PROFILE" | plutil -extract Name raw -)
          echo "Using provisioning profile: $PROFILE_NAME"
          python3 - <<'PY'
          import os
          from pathlib import Path

          bundle_id = os.environ.get("BUNDLE_ID", "com.nomorebets.app")
          team_id = os.environ.get("APPLE_TEAM_ID", "")
          profile_name = os.popen('security cms -D -i "$CM_PROVISIONING_PROFILE" | plutil -extract Name raw -').read().strip()

          plist = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>{team_id}</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>uploadBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>{bundle_id}</key>
                  <string>{profile_name}</string>
              </dict>
          </dict>
          </plist>
          """
          Path("/tmp/exportOptions.plist").write_text(plist)
          print(plist)
          PY
      - name: Build IPA
        script: |
          IOS_WORKSPACE="ios/NOMOREBETS.xcworkspace"
          IOS_SCHEME="NOMOREBETS"
          ARCHIVE_PATH="$CM_BUILD_DIR/build/ios/archive/NOMOREBETS.xcarchive"
          EXPORT_PATH="$CM_BUILD_DIR/build/ios/ipa"

          echo "Workspace: $IOS_WORKSPACE"
          echo "Scheme: $IOS_SCHEME"
          echo "Archive path: $ARCHIVE_PATH"
          echo "Export path: $EXPORT_PATH"

          mkdir -p "$CM_BUILD_DIR/build/ios/archive"
          mkdir -p "$EXPORT_PATH"

          xcodebuild archive -workspace "$IOS_WORKSPACE" -scheme "$IOS_SCHEME" -configuration Release -destination "generic/platform=iOS" -archivePath "$ARCHIVE_PATH" DEVELOPMENT_TEAM="$APPLE_TEAM_ID" CODE_SIGN_STYLE=Manual
          xcodebuild -exportArchive -archivePath "$ARCHIVE_PATH" -exportPath "$EXPORT_PATH" -exportOptionsPlist /tmp/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
